name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript Compiler Check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint

      - name: Run Production Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci_secret_hash_key_placeholder
          NEXTAUTH_URL: http://localhost:3000
          GITHUB_ID: mock_github_id
          GITHUB_SECRET: mock_github_secret
          ADMIN_EMAIL: admin@test.com
          NEXT_PUBLIC_SITE_URL: https://test-blog.vercel.app
          GIT_USER_NAME: CI Bot
          GIT_USER_EMAIL: ci@test.com
          GITHUB_TOKEN: mock_token
          GITHUB_REPO_URL: mock_repo
